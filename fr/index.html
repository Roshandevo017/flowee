<!DOCTYPE html>

<html lang="ta"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Poo Mart - Premium Flower Delivery</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&amp;family=Noto+Sans+Tamil:wght@300;400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#6b4cf6",
                        "background-light": "#f6f5f8",
                        "background-dark": "#131022",
                    },
                    fontFamily: {
                        "display": ["Plus Jakarta Sans", "Noto Sans Tamil", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                },
            },
        }
    setTimeout(function() {
    window.location.href = "loginscr.html";
  }, 2000);     
    </script>
<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 32px 0 rgba(107, 76, 246, 0.15);
        }
        
        .glow-effect {
            background: radial-gradient(circle at center, rgba(107, 76, 246, 0.4) 0%, rgba(107, 76, 246, 0) 70%);
        }
    </style>
</head>
<body class="font-display bg-background-light dark:bg-background-dark text-slate-900 dark:text-slate-100 min-h-screen flex flex-col overflow-hidden selection:bg-primary selection:text-white">
<!-- Splash Screen Container -->
<div class="relative flex min-h-screen w-full flex-col items-center justify-center overflow-hidden bg-[#f9f8fc] dark:bg-[#131022]">
<!-- Abstract Background Gradients -->
<div class="absolute inset-0 z-0">
<!-- Main Gradient -->
<div class="absolute inset-0 bg-gradient-to-br from-[#e0dcfc] via-[#f3f0ff] to-[#f9f8fc] dark:from-[#1a1630] dark:via-[#131022] dark:to-[#0b0914]"></div>
<!-- Royal Purple Glow spots -->
<div class="absolute top-1/4 left-1/4 h-96 w-96 -translate-x-1/2 -translate-y-1/2 rounded-full bg-primary/20 blur-[100px] dark:bg-primary/10"></div>
<div class="absolute bottom-1/4 right-1/4 h-[500px] w-[500px] translate-x-1/3 translate-y-1/3 rounded-full bg-pink-400/10 blur-[120px] dark:bg-pink-600/10"></div>
</div>
<!-- Glassmorphism Card -->
<div class="glass-panel relative z-10 flex w-full max-w-md flex-col items-center justify-center gap-8 rounded-xl p-12 mx-4 md:p-16">
<!-- Logo Section -->
<div class="relative flex flex-col items-center justify-center">
<!-- Outer glow for logo -->
<div class="absolute inset-0 -z-10 scale-150 rounded-full bg-primary/20 blur-xl"></div>
<!-- Logo Image/Icon -->
<div class="relative flex h-32 w-32 items-center justify-center rounded-full bg-white/80 p-6 shadow-xl dark:bg-white/10 ring-1 ring-white/50">
<!-- Using a flower icon as placeholder for the stylized logo described -->
<div class="text-6xl text-emerald-500 drop-shadow-sm material-symbols-outlined">
                        local_florist
                   </div>
<!-- Pink accent overlay -->
<div class="absolute bottom-6 right-6 text-3xl text-pink-400 drop-shadow-sm material-symbols-outlined">
                        spa
                   </div>
</div>
</div>
<!-- Text Content -->
<div class="flex flex-col items-center gap-3 text-center">
<h1 class="font-display text-4xl font-extrabold tracking-tight text-[#100d1c] dark:text-white sm:text-5xl drop-shadow-sm">
                    பூ மார்ட்
                </h1>
<p class="max-w-[280px] font-display text-lg font-medium leading-relaxed text-slate-600 dark:text-slate-300">
                    புதிய மலர்கள் உங்கள் வீடு வரை
                </p>
</div>
<!-- Loader / Interactive Element -->
<div class="mt-4 flex flex-col items-center gap-4 w-full">
<div class="h-1.5 w-32 overflow-hidden rounded-full bg-slate-200 dark:bg-slate-700/50">
<div class="h-full w-1/2 animate-[shimmer_1.5s_infinite] bg-gradient-to-r from-primary/40 via-primary to-primary/40 rounded-full"></div>
</div>
<span class="text-xs font-medium text-slate-400 dark:text-slate-500 uppercase tracking-widest">Loading</span>
</div>
</div>
<!-- Decorative Bottom Elements -->
<div class="absolute bottom-0 w-full">
<div class="mx-auto h-[1px] w-3/4 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
<p class="py-6 text-center text-xs font-medium text-slate-400 dark:text-slate-600">
                 Premium Flower Delivery Tamil Nadu
             </p>
</div>
</div>
<style>
        @keyframes shimmer {
            0% { transform: translateX(-150%); }
            50% { transform: translateX(0%); }
            100% { transform: translateX(150%); }
        }
    </style>


</body>

</html>
